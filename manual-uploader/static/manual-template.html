<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Appliance Manual</title>
<script>/*__DATA_INJECTION__*/</script>
<style>
  :root {
    --bg: #f5f5f7; --card: #fff; --text: #1a1a1a; --muted: #6b6b70;
    --accent: #0a84ff; --border: #e5e5ea; --danger: #ff3b30;
  }
  @media (prefers-color-scheme: dark) {
    :root { --bg: #000; --card: #1c1c1e; --text: #fff; --muted: #98989d; --border: #38383a; }
  }
  * { box-sizing: border-box; }
  body {
    margin: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: var(--bg); color: var(--text); line-height: 1.5; -webkit-font-smoothing: antialiased;
  }
  .container { max-width: 720px; margin: 0 auto; padding: 20px 16px 40px; }
  header { margin-bottom: 24px; }
  h1 { font-size: 28px; font-weight: 700; margin: 0 0 4px; letter-spacing: -0.5px; }
  .subtitle { color: var(--muted); font-size: 15px; margin: 0; }
  .card { background: var(--card); border-radius: 14px; padding: 18px; margin-bottom: 16px; border: 1px solid var(--border); }
  .card h2 { font-size: 18px; font-weight: 600; margin: 0 0 12px; }
  .video-item, .pdf-item { margin-bottom: 14px; }
  .video-label { font-size: 14px; color: var(--muted); margin-bottom: 4px; }
  video, iframe { width: 100%; border-radius: 10px; background: #000; display: block; }
  iframe { aspect-ratio: 16/9; border: 0; }
  details { border-top: 1px solid var(--border); padding: 12px 0; }
  details:first-of-type { border-top: none; padding-top: 0; }
  summary { cursor: pointer; font-weight: 500; list-style: none; display: flex; justify-content: space-between; align-items: center; }
  summary::after { content: "+"; color: var(--muted); font-size: 20px; margin-left: 8px; }
  details[open] summary::after { content: "−"; }
  details > div { padding-top: 8px; color: var(--muted); font-size: 15px; }
  .btn {
    display: block; text-align: center; padding: 12px; border-radius: 10px;
    text-decoration: none; font-weight: 500; font-size: 15px;
    border: 1px solid var(--border); color: var(--text); background: var(--card);
  }
  footer { text-align: center; color: var(--muted); font-size: 12px; margin-top: 24px; }
  footer a { color: var(--muted); }
</style>
</head>
<body>
<div class="container">
  <header>
    <h1 id="title"></h1>
    <p class="subtitle" id="subtitle"></p>
  </header>

  <div class="card" id="videos-card" style="display:none">
    <h2>Videos</h2>
    <div id="videos-list"></div>
  </div>

  <div class="card" id="trouble-card" style="display:none">
    <h2>Troubleshooting</h2>
    <div id="trouble-list"></div>
  </div>

  <div class="card" id="pdf-card" style="display:none">
    <h2>PDF Manuals</h2>
    <div id="pdf-list"></div>
  </div>

  <footer>Generated by Manual Uploader</footer>
</div>

<script>
const DATA = window.__APPLIANCE_DATA__ || {title: "Appliance", subtitle: "", videos: [], trouble: [], pdfs: []};

function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}
function escapeAttr(s) { return escapeHtml(s); }
function embedUrl(url) {
  const yt = url.match(/(?:youtube\.com\/watch\?v=|youtu\.be\/)([^&?]+)/);
  if (yt) return `https://www.youtube.com/embed/${yt[1]}`;
  const vimeo = url.match(/vimeo\.com\/(\d+)/);
  if (vimeo) return `https://player.vimeo.com/video/${vimeo[1]}`;
  return url;
}

document.getElementById('title').textContent = DATA.title || 'Appliance';
document.getElementById('subtitle').textContent = DATA.subtitle || '';
document.title = (DATA.title || 'Appliance').replace(/[^\w\s]/g,'').trim() + " — Manual";

if (DATA.videos && DATA.videos.length) {
  document.getElementById('videos-card').style.display = '';
  document.getElementById('videos-list').innerHTML = DATA.videos.map(v => `
    <div class="video-item">
      <div class="video-label">${escapeHtml(v.label)}</div>
      ${v.src.match(/youtube\.com|youtu\.be|vimeo\.com/i)
        ? `<iframe src="${embedUrl(v.src)}" allowfullscreen></iframe>`
        : `<video controls preload="metadata" playsinline><source src="${escapeAttr(v.src)}"></video>`}
    </div>`).join('');
}

if (DATA.trouble && DATA.trouble.length) {
  document.getElementById('trouble-card').style.display = '';
  document.getElementById('trouble-list').innerHTML = DATA.trouble.map(t => `
    <details>
      <summary>${escapeHtml(t.question)}</summary>
      <div>${escapeHtml(t.answer)}</div>
    </details>`).join('');
}

if (DATA.pdfs && DATA.pdfs.length) {
  document.getElementById('pdf-card').style.display = '';
  document.getElementById('pdf-list').innerHTML = DATA.pdfs.map(p => `
    <div class="pdf-item">
      <a class="btn" href="${escapeAttr(p.src)}" target="_blank">📄 ${escapeHtml(p.label)}</a>
    </div>`).join('');
}
</script>
</body>
</html>
