<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Appliance Manuals</title>
<style>
  :root {
    --bg: #f5f5f7; --card: #fff; --text: #1a1a1a; --muted: #6b6b70;
    --accent: #0a84ff; --border: #e5e5ea; --danger: #ff3b30; --success: #34c759;
  }
  @media (prefers-color-scheme: dark) {
    :root { --bg: #000; --card: #1c1c1e; --text: #fff; --muted: #98989d; --border: #38383a; }
  }
  * { box-sizing: border-box; }
  body {
    margin: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: var(--bg); color: var(--text); line-height: 1.5; -webkit-font-smoothing: antialiased;
  }
  .container { max-width: 900px; margin: 0 auto; padding: 20px 16px 100px; }
  header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; }
  h1 { font-size: 26px; font-weight: 700; margin: 0; letter-spacing: -0.5px; }
  .btn {
    padding: 10px 16px; border-radius: 10px; border: 1px solid var(--border);
    background: var(--card); color: var(--text); cursor: pointer; font-weight: 600; font-size: 14px;
    text-decoration: none; display: inline-block;
  }
  .btn.primary { background: var(--accent); color: #fff; border-color: var(--accent); }
  .btn.danger { background: var(--danger); color: #fff; border-color: var(--danger); }
  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 14px; }
  .manual-card {
    background: var(--card); border: 1px solid var(--border); border-radius: 14px;
    padding: 16px; position: relative;
  }
  .manual-card h3 { margin: 0 0 4px; font-size: 17px; font-weight: 600; }
  .manual-card .sub { color: var(--muted); font-size: 13px; margin: 0 0 12px; }
  .manual-card .meta { display: flex; gap: 10px; font-size: 12px; color: var(--muted); margin-bottom: 12px; }
  .manual-card .actions { display: flex; gap: 6px; flex-wrap: wrap; }
  .manual-card .actions .btn { padding: 6px 10px; font-size: 13px; }
  .empty {
    text-align: center; padding: 60px 20px; color: var(--muted);
    background: var(--card); border: 2px dashed var(--border); border-radius: 14px;
  }
  .empty h2 { margin: 0 0 8px; color: var(--text); }
</style>
</head>
<body>
<div class="container">
  <header>
    <h1>📚 Appliance Manuals</h1>
    <a class="btn primary" href="editor">➕ New Manual</a>
  </header>

  <div id="content"></div>
</div>

<script>
const BASE = window.location.pathname.replace(/\/$/, '');

async function api(path, opts = {}) {
  const res = await fetch(BASE + '/api' + path, opts);
  if (!res.ok) throw new Error(`HTTP ${res.status}`);
  return res.json();
}

async function loadManuals() {
  const content = document.getElementById('content');
  try {
    const manuals = await api('/manuals');
    const ids = Object.keys(manuals);

    if (ids.length === 0) {
      content.innerHTML = `
        <div class="empty">
          <h2>No manuals yet</h2>
          <p>Create your first appliance manual to get started.</p>
          <a class="btn primary" href="editor" style="margin-top:12px">➕ Create Manual</a>
        </div>`;
      return;
    }

    content.innerHTML = '<div class="grid">' + ids.map(id => {
      const m = manuals[id];
      const videoCount = (m.videos || []).length;
      const pdfCount = (m.pdfs || []).length;
      const troubleCount = (m.trouble || []).length;
      return `
        <div class="manual-card">
          <h3>${escapeHtml(m.title || 'Untitled')}</h3>
          <p class="sub">${escapeHtml(m.subtitle || '')}</p>
          <div class="meta">
            <span>📹 ${videoCount}</span>
            <span>📄 ${pdfCount}</span>
            <span>🔧 ${troubleCount}</span>
          </div>
          <div class="actions">
            <a class="btn primary" href="${m._local_url || '#'}" target="_blank">Open</a>
            <a class="btn" href="editor?id=${encodeURIComponent(id)}">Edit</a>
            <button class="btn danger" onclick="deleteManual('${id}')">Delete</button>
          </div>
        </div>`;
    }).join('') + '</div>';
  } catch (e) {
    content.innerHTML = `<div class="empty"><h2>Error</h2><p>${e.message}</p></div>`;
  }
}

async function deleteManual(id) {
  if (!confirm('Delete this manual? The HTML file will also be removed.')) return;
  try {
    await api('/manuals/' + encodeURIComponent(id), { method: 'DELETE' });
    loadManuals();
  } catch (e) {
    alert('Delete failed: ' + e.message);
  }
}

function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

loadManuals();
</script>
</body>
</html>
